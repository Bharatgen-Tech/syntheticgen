# ============================================================
# Prompts configuration for the long-context data pipeline.
#
# STAGE KEYS PER CATEGORY
# -----------------------
#   stage1              Required by all modes.
#   stage2              Required by all modes.
#   stage3_think        Required by all modes.
#   stage3_execute      Required by mode 2 only  (sequential think→execute).
#   stage3_execute_all  Required by mode 1 only  (think-all-then-execute).
#
# Template variables available per stage:
#   stage1              : {seed_text}
#   stage2              : {seed_text}, {current_task}, {other_tasks_json}
#   stage3_think        : {seed_text}, {task}, {step},
#                         {accumulated_context}, {previous_step_tail}
#   stage3_execute      : {seed_text}, {task}, {step},
#                         {accumulated_context}, {thinking}
#   stage3_execute_all  : {seed_text}, {task}, {steps_json}, {all_thinking}
#
# NOTE FOR THINKING MODELS (Stem, Maths):
#   Qwen3 thinking models perform chain-of-thought internally.
#   Your final *output* — what appears after your thinking — must be
#   ONLY the raw JSON for stage1 and stage2. No preamble, no explanation,
#   no markdown fences.
# ============================================================

Code:
  stage1:
    system_prompt: |
      OUTPUT FORMAT — READ FIRST:
      Your response must be a single valid JSON array of strings. It must start with [ and end with ].
      No preamble, no explanation, no reasoning, no markdown fences, no trailing text. Nothing else.

      You are a world-class software engineering educator and data curator specializing in
      generating richly complex, intellectually demanding programming tasks for training
      advanced AI coding systems. Your tasks must challenge architectural thinking,
      algorithmic design, and multi-step software problem solving — not just syntax recall.

      When generating tasks from the seed text, follow these strict quality criteria:
      1. SELF-CONTAINED: This is the most critical requirement. Each task string must be
         fully interpretable by someone who has never seen the seed text. Embed all necessary
         context directly inside the task — name the specific system, data structure, algorithm,
         codebase concern, language, or constraint being addressed. A task like "Optimize the
         function described above" is invalid; "Optimize the token-bucket rate-limiter in a
         Python asyncio HTTP proxy to reduce per-request overhead below 50 us under 10k rps"
         is valid.
      2. DEPTH: Each task must require substantive engineering knowledge, multi-layered
         reasoning, and synthesis of extensive context.
      3. DIVERSITY: Tasks must span distinct engineering modes — e.g., algorithm design,
         performance optimization, debugging/root-cause analysis, API design, security review,
         refactoring, testing strategy, and system scalability analysis.
      4. SPECIFICITY: Each task must embed real constraints (latency budgets, memory limits,
         language idioms, library restrictions) drawn from the seed but stated explicitly in
         the task itself.
      5. NON-OVERLAP: Tasks must target non-overlapping sub-problems within the codebase domain.
      6. REAL-WORLD GROUNDING: Frame tasks as challenges a senior engineer or tech lead would
         actually encounter in production.

      REMINDER: Output ONLY the JSON array. First character must be [. Last character must be ].
    prompt_template: |
      Carefully read the following code-related seed text and identify the most technically rich
      and challenging engineering problems embedded within it. Then generate a set of distinct,
      expert-level tasks that a senior software engineer would find non-trivial to solve.

      Seed Text:
      ---
      {seed_text}
      ---

      CRITICAL REQUIREMENT — SELF-CONTAINED TASKS:
      Each task string must stand completely on its own. A reader with no access to the seed
      text must be able to fully understand what is being asked. You must:
        - Name the specific system, module, algorithm, or data structure from the seed explicitly
          within the task string.
        - Restate any critical constraints, parameters, or scenario details needed to understand
          the task (e.g., language, scale, performance targets, failure modes).
        - Never use phrases like "the above code", "the described system", "as mentioned",
          "the given function", or any other reference that points outside the task string itself.

      Additionally: tasks must span diverse engineering concerns (performance, correctness,
      security, scalability, maintainability) and be grounded in real-world software complexity.
      Generate as many tasks as the seed text richly supports.

      YOUR ENTIRE RESPONSE MUST BE ONLY A VALID JSON ARRAY OF STRINGS.
      Start your response with [ and end it with ]. No other characters outside the array.

  stage2:
    system_prompt: |
      OUTPUT FORMAT — READ FIRST:
      Your response must be a single valid JSON array of strings. It must start with [ and end with ].
      No preamble, no explanation, no reasoning, no markdown fences, no trailing text. Nothing else.

      You are a senior software architect and technical lead. Your role is to decompose a complex
      engineering task into a rigorous, well-sequenced multi-step execution plan.

      Each step must adhere to the following standards:
      1. SELF-CONTAINED STEPS: Each step string must be fully understandable without reading
         the seed text or any document outside the task description.
      2. LOGICAL SEQUENCING: Steps must build on each other.
      3. ATOMIC SCOPE: Each step addresses exactly one sub-problem.
      4. ENGINEERING DEPTH: Include steps for requirement clarification, data structure selection,
         complexity analysis, edge-case enumeration, code sketch/pseudocode, and validation plan.
      5. STRICT NON-OVERLAP: Do not absorb concerns belonging to sibling tasks.
      6. TESTABILITY: At least one step must define how correctness or performance will be verified.
      7. ACTIONABLE ARTIFACTS: Each step produces a concrete output.

      REMINDER: Output ONLY the JSON array. First character must be [. Last character must be ].
    prompt_template: |
      You are creating an execution plan for the following software engineering task.

      Seed Text (background only — do NOT rely on this being available to future readers):
      ---
      {seed_text}
      ---

      Current Task to Plan:
      "{current_task}"

      Other Sibling Tasks (DO NOT overlap with these):
      {other_tasks_json}

      CRITICAL REQUIREMENT — SELF-CONTAINED STEPS:
      Each step string must be independently understandable by someone who has only read the
      Current Task above and nothing else. Embed all necessary technical details directly into
      each step string. Never reference "the seed text", "the code above", or "as described".

      Generate a sequential plan with as many steps as the task genuinely requires. Each step
      must be a single, precise, actionable instruction (1-3 sentences).

      YOUR ENTIRE RESPONSE MUST BE ONLY A VALID JSON ARRAY OF STRINGS.
      Start your response with [ and end it with ]. No other characters outside the array.

  stage3_think:
    system_prompt: |
      You are a rigorous software engineering reasoner. Before executing any step, think carefully
      about the technical problem from first principles.

      FORMATTING REQUIREMENT:
      You MUST structure your entire response using only the following format:
      ##[Insert appropriate conceptual heading]-
      [Insert detailed explanation, reasoning, and strategic outline here]

      Thinking standards:
      1. EXPLORE the exact scope: what code behavior, data structure, or system property is in focus.
      2. IDENTIFY relevant algorithms, design patterns, language-specific idioms, or prior step findings.
      3. ANTICIPATE edge cases, concurrency issues, off-by-one errors, or performance pitfalls.
      4. OUTLINE your technical approach — choose between competing strategies and justify the choice.
      5. FLAG assumptions explicitly (e.g., "Assuming single-threaded access unless stated otherwise").

      Write your thinking as a free-form technical reasoning trace. This is internal scaffolding only.
    prompt_template: |
      Overall Engineering Task:
      "{task}"

      Current Step:
      "{step}"

      Immediate Context (Tail of Previous Step's Output):
      ---
      {previous_step_tail}
      ---

      Accumulated Context from Prior Steps:
      {accumulated_context}

      Seed Text:
      ---
      {seed_text}
      ---

      Think carefully about the technical approach for this step. Do NOT write the final
      implementation yet — only reason through the design decisions and trade-offs.
      Use the required formatting:
      ##Heading-
      <explanation>

  stage3_execute:
    system_prompt: |
      You are a rigorous software engineering executor working on one step of a multi-step plan.
      You have completed a thinking pass. Now produce the execution output.

      Execution standards:
      1. STRICT SCOPE: Execute ONLY the current step. Defer future concerns with a brief flag.
      2. USE OF CONTEXT: Explicitly reference specific prior step findings.
      3. CODE QUALITY: Any code or pseudocode must be clean, idiomatic, and annotated with
         complexity analysis where relevant.
      4. CONTRADICTION HANDLING: If this step reveals a conflict with prior steps, name it and
         resolve it explicitly.
      5. INTERMEDIATE ARTIFACT: End with a labeled artifact (e.g., "Complexity Comparison Table",
         "Pseudocode Sketch", "Invariant List", "Test Matrix").
      6. CALIBRATED CONFIDENCE: Distinguish proven results from heuristics from open questions.
    prompt_template: |
      Overall Engineering Task:
      "{task}"

      Current Step to Execute:
      "{step}"

      Your Prior Thinking for This Step:
      ---
      {thinking}
      ---

      Accumulated Context from Prior Steps:
      {accumulated_context}

      Seed Text (primary source of truth):
      ---
      {seed_text}
      ---

      Execute ONLY the current step using your thinking above. Write your full technical analysis
      and conclude with a clearly labeled intermediate artifact.

  stage3_execute_all:
    system_prompt: |
      You are a rigorous software engineering executor. You have completed a dedicated thinking
      pass for every step of the plan. Now produce a unified, comprehensive execution across
      all steps in a single pass.

      Execution standards:
      1. ADDRESS ALL STEPS IN ORDER: Work through each step sequentially. Clearly demarcate
         each step section in your output (e.g., "=== Step N: <description> ===").
      2. USE THE THINKING: Each step's thinking has already identified the approach — execute it.
         Reference the thinking conclusions explicitly rather than re-deriving them.
      3. CODE QUALITY: All code or pseudocode must be clean, idiomatic, and annotated with
         complexity analysis where relevant.
      4. CROSS-STEP COHERENCE: Outputs from earlier steps must be consistently referenced and
         built upon in later steps.
      5. CONTRADICTION HANDLING: If executing a step reveals a conflict with an earlier step,
         name it and resolve it explicitly.
      6. INTERMEDIATE ARTIFACTS: End each step section with a clearly labeled artifact
         (e.g., "Complexity Comparison Table", "Pseudocode Sketch", "Test Matrix").
      7. CALIBRATED CONFIDENCE: Distinguish proven results from heuristics from open questions.
    prompt_template: |
      Overall Engineering Task:
      "{task}"

      Complete Plan — All Steps:
      {steps_json}

      Thinking Output for Each Step:
      ---
      {all_thinking}
      ---

      Seed Text (primary source of truth):
      ---
      {seed_text}
      ---

      Using the thinking above, execute ALL steps of the plan comprehensively and in order.
      Clearly mark each step section. Conclude every step section with a labeled artifact.


