name: qa_generation
flow: linear

# For each input document, extract 3 concepts, then generate a
# question/answer pair per concept — all using the same seed text
# as evidence. Demonstrates fanout (3 concepts per seed → 3 QA calls in parallel)
# and JSON parsing.

stages:
  - name: concepts
    system_prompt: "You are a meticulous reader."
    prompt: |
      Read the following text and list the 3 most important concepts it
      introduces, as a JSON array of short strings (no explanations).

      Text:
      {seed.text}
    decoding:
      temperature: 0.3
      max_tokens: 256
      parse: json

  - name: qa_pairs
    fanout: concepts
    system_prompt: "You write precise Q&A pairs grounded in evidence."
    prompt: |
      Source text:
      {seed.text}

      Concept to cover: {item}

      Produce a JSON object with keys "question" and "answer". The answer
      must be faithful to the source text. Do not include anything else.
    decoding:
      temperature: 0.4
      max_tokens: 512
      parse: json

merge:
  template: |
    Concepts: {concepts}

    QA pairs:
    {qa_pairs}
